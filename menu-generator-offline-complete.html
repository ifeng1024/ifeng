<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>智慧食堂菜单生成器 - 离线版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:15px;padding-bottom:80px}
.container{max-width:100%;margin:0 auto}
.header{text-align:center;color:#fff;margin-bottom:20px;padding:15px 0}
.header h1{font-size:1.6em;margin-bottom:8px;font-weight:600}
.header p{font-size:.9em;opacity:.9}
.offline-badge{background:rgba(255,255,255,.2);padding:4px 12px;border-radius:20px;font-size:.75em;display:inline-block;margin-top:5px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:15px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.card-title{font-size:1.1em;color:#667eea;margin-bottom:15px;font-weight:600}
.form-row{margin-bottom:15px}
.form-label{display:block;font-weight:600;color:#333;margin-bottom:8px}
.form-input{width:100%;padding:12px;border:2px solid #e8e8e8;border-radius:8px;font-size:15px}
.form-input:focus{outline:none;border-color:#667eea}
.form-hint{font-size:.8em;color:#999;margin-top:5px}
.dish-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;background:#f8f9fa;padding:15px;border-radius:10px;margin-bottom:20px}
.dish-item{background:#fff;padding:12px;border-radius:8px;border:1px solid #e8e8e8}
.dish-item label{display:block;font-size:.85em;color:#666;margin-bottom:6px}
.dish-item input{width:100%;padding:8px;border:2px solid #e8e8e8;border-radius:6px;font-size:16px;text-align:center}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
.btn-success{background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%);color:#fff}
.version-buttons{display:flex;gap:10px;overflow-x:auto;margin-bottom:15px}
.version-btn{flex:0 0 auto;padding:12px 20px;border:2px solid #e8e8e8;border-radius:8px;background:#fff;font-weight:600}
.version-btn.selected{border-color:#667eea;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
.day-card{background:#fff;border-radius:12px;padding:15px;margin-bottom:15px}
.day-header{font-size:1.2em;color:#667eea;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #f0f0f0}
.meal-section{margin-bottom:12px}
.meal-title{font-size:.9em;color:#764ba2;margin-bottom:8px;font-weight:600}
.dish-list{display:flex;flex-direction:column;gap:8px}
.meal-item{background:#f8f9fa;padding:10px;border-radius:8px;border-left:4px solid #667eea}
.meal-item.big{border-left-color:#e74c3c}
.meal-item.small{border-left-color:#f39c12}
.meal-item.veg{border-left-color:#27ae60}
.dish-tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:.75em;margin-left:5px}
.dish-tag.spicy{background:#fee;color:#e74c3c}
.dish-info{font-size:.8em;color:#999;margin-top:4px}
.tabs{display:flex;background:#fff;border-radius:10px;padding:5px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.tab{flex:1;padding:10px;border:none;background:0 0;font-weight:600;border-radius:8px}
.tab.active{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
.summary{background:#e3f2fd;padding:12px;border-radius:8px;margin-bottom:15px;font-size:.85em}
.materials-table{width:100%;border-collapse:collapse;font-size:.85em}
.materials-table th,.materials-table td{padding:10px;text-align:left;border-bottom:1px solid #f0f0f0}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:10px;box-shadow:0 -2px 10px rgba(0,0,0,.1);display:flex;gap:10px}
.nav-btn{flex:1;padding:12px;border:none;border-radius:8px;font-weight:600}
.nav-btn.primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
.nav-btn.success{background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%);color:#fff}
.loading{text-align:center;color:#fff;padding:40px;display:none}
</style>
</head>

<p>离线版 - 无需网络即可使用</p>
<span class="offline-badge">💾 内置901道菜品</span>
</div>
<div class="card">
<div class="card-title">📝 菜单配置</div>
<div class="form-row"><label class="form-label">👥 用餐人数</label><input type="number" class="form-input" id="peopleCount" value="500" min="50" max="5000"></div>
<div class="form-row"><label class="form-label">📅 生成天数</label><select class="form-input" id="days"><option value="1">1 天</option><option value="3">3 天</option><option value="5" selected>5 天</option><option value="7">7 天</option></select></div>
<div class="card-title" style="margin-top:20px">🥗 每餐菜品数量</div>
<div class="dish-grid">
<div class="dish-item"><label>🍖 大荤</label><input type="number" id="bigMeat" value="2" min="1" max="5"></div>
<div class="dish-item"><label>🥘 小荤</label><input type="number" id="smallMeat" value="2" min="1" max="5"></div>
<div class="dish-item"><label>🥬 素菜</label><input type="number" id="veg" value="2" min="1" max="5"></div>
<div class="dish-item"><label>🍲 汤品</label><input type="number" id="other" value="1" min="0" max="3"></div>
</div>
<button class="btn btn-primary" onclick="generateMenus()" id="generateBtn">✨ 生成三版菜单</button>
</div>
<div id="loadingContainer" class="loading">🔄 正在生成菜单...</div>
<div class="card version-selector" id="versionSelector" style="display:none"><div class="version-buttons" id="versionButtons"></div></div>
<div class="menu-container" id="menuContainer" style="display:none">
<div class="tabs"><button class="tab active" onclick="switchTab('menu')">📅 菜单</button><button class="tab" onclick="switchTab('materials')">🛒 采购</button></div>
<div class="summary" id="summaryInfo"></div>
<div id="menuGrid"></div>
<div class="card" id="materialsSection" style="display:none"><div class="card-title">🛒 原材料采购清单</div><table class="materials-table"><thead><tr><th>原材料</th><th>采购量</th><th>净料量</th><th>出成率</th></tr></thead><tbody id="materialsTableBody"></tbody></table></div>
</div>
</div>
<div class="bottom-nav" id="bottomNav" style="display:none"><button class="nav-btn primary" onclick="generateMenus()">🔄 重新生成</button><button class="nav-btn success" onclick="exportMenu()">📥 导出</button></div>

function switchTab(tab){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));if(tab==='menu'){document.querySelectorAll('.tab')[0].classList.add('active');document.getElementById('menuGrid').style.display='block';document.getElementById('materialsSection').style.display='none'}else{document.querySelectorAll('.tab')[1].classList.add('active');document.getElementById('menuGrid').style.display='none';document.getElementById('materialsSection').style.display='block'}}

function selectDishes(available,count,usedMats,usedMethods){let selected=[],remaining=[...available].sort(()=>Math.random()-0.5);for(let i=0;i<count&&remaining.length>0;i++){let best=remaining.find(d=>!selected.includes(d)&&!usedMats.has(d.main_material)&&!usedMethods.has(d.method));if(!best)best=remaining.find(d=>!selected.includes(d)&&!usedMats.has(d.main_material));if(!best)best=remaining.find(d=>!selected.includes(d));if(best){selected.push(best);if(best.main_material)usedMats.add(best.main_material);if(best.method)usedMethods.add(best.method)}}return selected}

function generateMenu(params,seed){let menu=[],weekdays=['周一','周二','周三','周四','周五','周六','周日'];for(let i=0;i<params.days;i++){let lunch={'大荤':[],'小荤':[],'素菜':[]};let matsBig=new Set(),methodsBig=new Set();lunch['大荤']=selectDishes(DISH_DB['大荤'],params.bigMeat,matsBig,methodsBig);let matsSmall=new Set(),methodsSmall=new Set();lunch['小荤']=selectDishes(DISH_DB['小荤'],params.smallMeat,matsSmall,methodsSmall);let matsVeg=new Set();lunch['素菜']=selectDishes(DISH_DB['素菜'],params.veg,matsVeg,new Set());menu.push({'day':weekdays[i]||'第'+(i+1)+'天','午餐':lunch})}return menu}

function calcMaterials(menu,people){let mats={};menu.forEach(day=>{let meal=day['午餐'];let bigCount=meal['大荤'].length||1,smallCount=meal['小荤'].length||1;let bigPerDish=100*0.6/bigCount,smallPerDish=100*0.4/smallCount;meal['大荤'].forEach(d=>{let m=d.main_material||'默认';let net=people*bigPerDish;let rate=YIELD_RATES[m]||0.8;if(!mats[m])mats[m]={material:m,dishes:[],net:0,gross:0};mats[m].dishes.push(d.name);mats[m].net+=net;mats[m].gross+=net/rate});meal['小荤'].forEach(d=>{let m=d.main_material||'默认';let net=people*smallPerDish;let rate=YIELD_RATES[m]||0.8;if(!mats[m])mats[m]={material:m,dishes:[],net:0,gross:0};mats[m].dishes.push(d.name);mats[m].net+=net;mats[m].gross+=net/rate});meal['素菜'].forEach(d=>{let m=d.main_material||'蔬菜';let net=people*150;let rate=YIELD_RATES[m]||0.85;if(!mats[m])mats[m]={material:m,dishes:[],net:0,gross:0};mats[m].dishes.push(d.name);mats[m].net+=net;mats[m].gross+=net/rate})});return Object.values(mats).map(m=>({material:m.material,dish:m.dishes.join('、'),net_weight_kg:(m.net/1000).toFixed(2),gross_weight_kg:(m.gross/1000).toFixed(2),yield_rate:Math.round((YIELD_RATES[m.material]||0.8)*100)+'%'}))}

function generateMenus(){let btn=document.getElementById('generateBtn'),loading=document.getElementById('loadingContainer'),menuContainer=document.getElementById('menuContainer'),versionSelector=document.getElementById('versionSelector'),bottomNav=document.getElementById('bottomNav');menuContainer.style.display='none';versionSelector.style.display='none';btn.disabled=true;loading.style.display='block';setTimeout(()=>{let params={people_count:parseInt(document.getElementById('peopleCount').value),days:parseInt(document.getElementById('days').value),bigMeat:parseInt(document.getElementById('bigMeat').value),smallMeat:parseInt(document.getElementById('smallMeat').value),veg:parseInt(document.getElementById('veg').value),other:parseInt(document.getElementById('other').value)};currentParams=params;allMenus=[1,2,3].map(v=>({version:v,menu:generateMenu(params,v)}));currentMaterials=calcMaterials(allMenus[0].menu,params.people_count);let btnContainer=document.getElementById('versionButtons');btnContainer.innerHTML='';allMenus.forEach((m,i)=>{let b=document.createElement('button');b.className='version-btn'+(i===0?' selected':'');b.innerHTML='📋 版本'+(i+1);b.onclick=()=>selectVersion(i);btnContainer.appendChild(b)});versionSelector.style.display='block';selectVersion(0);menuContainer.style.display='block';bottomNav.style.display='flex';btn.disabled=false;loading.style.display='none'},100)}

function selectVersion(i){currentVersion=i+1;document.querySelectorAll('.version-btn').forEach((b,idx)=>b.classList.toggle('selected',idx===i));displayMenu(allMenus[i].menu);currentMaterials=calcMaterials(allMenus[i].menu,currentParams.people_count);updateSummary();displayMaterials()}

function updateSummary(){document.getElementById('summaryInfo').innerHTML='<p>📊 '+currentParams.people_count+'人 | '+currentParams.days+'天</p><p>🍽️ 大荤'+currentParams.bigMeat+' | 小荤'+currentParams.smallMeat+' | 素菜'+currentParams.veg+'</p><p>📋 版本：第'+currentVersion+'版</p>'}

function displayMenu(menu){let container=document.getElementById('menuGrid');container.innerHTML='';menu.forEach(day=>{let card=document.createElement('div');card.className='day-card';let html='<div class="day-header">📅 '+day.day+'</div>';let lunch=day['午餐'];if(lunch['大荤'])html+='<div class="meal-section"><div class="meal-title">🍖 大荤</div><div class="dish-list">'+lunch['大荤'].map(d=>'<div class="meal-item big">'+d.name+'<div class="dish-info">'+(d.taste==='辣'?'<span class="dish-tag spicy">🌶️</span>':'')+d.method+' | '+d.flavor+'</div></div>').join('')+'</div></div>';if(lunch['小荤'])html+='<div class="meal-section"><div class="meal-title">🥘 小荤</div><div class="dish-list">'+lunch['小荤'].map(d=>'<div class="meal-item small">'+d.name+'<div class="dish-info">'+(d.taste==='辣'?'<span class="dish-tag spicy">🌶️</span>':'')+d.method+'</div></div>').join('')+'</div></div>';if(lunch['素菜'])html+='<div class="meal-section"><div class="meal-title">🥬 素菜</div><div class="dish-list">'+lunch['素菜'].map(d=>'<div class="meal-item veg">'+d.name+'<div class="dish-info">'+d.method+'</div></div>').join('')+'</div></div>';card.innerHTML=html;container.appendChild(card)})}

function displayMaterials(){let tbody=document.getElementById('materialsTableBody');tbody.innerHTML=currentMaterials.map(m=>'<tr><td><strong>'+m.material+'</strong><br><span style="color:#999;font-size:0.85em">'+m.dish.substring(0,10)+(m.dish.length>10?'...':'')+'</span></td><td>'+m.gross_weight_kg+'kg</td><td>'+m.net_weight_kg+'kg</td><td>'+m.yield_rate+'</td></tr>').join('')}

function exportMenu(){let data={version:currentVersion,params:currentParams,menu:allMenus[currentVersion-1].menu,materials:currentMaterials};let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});let link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download='菜单_版本'+currentVersion+'.json';link.click()}
</script>
